<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scientist-Bin</title>
    <meta name="description" content="Multi-agent ML training system" />
    <script>
      // Theme flash prevention: apply stored theme before first paint
      (function () {
        var theme = localStorage.getItem("scientist-bin-theme");
        if (theme === "dark" || theme === "science") {
          document.documentElement.classList.add(theme);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
