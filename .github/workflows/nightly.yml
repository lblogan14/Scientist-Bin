name: Nightly E2E

on:
  schedule:
    - cron: "0 3 * * *" # 3 AM UTC daily
  workflow_dispatch:

jobs:
  backend-e2e:
    name: Backend E2E (real LLM)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install dependencies
        run: uv sync --all-groups --extra all-traditional

      - name: Provision framework venvs
        run: uv run scientist-bin provision analyst traditional

      - name: Run sklearn E2E tests
        run: uv run pytest tests/test_e2e_pipeline.py -v --timeout=600 -m slow
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Run FLAML E2E tests
        run: uv run pytest tests/test_e2e_flaml.py -v --timeout=600 -m slow
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

      - name: Run FLAML API E2E tests
        run: uv run pytest tests/test_e2e_api_flaml.py -v --timeout=600 -m slow
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}

  playwright-lifecycle:
    name: Playwright Lifecycle (real LLM)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install backend
        run: cd backend && uv sync --all-groups --extra all-traditional

      - name: Provision framework venvs
        run: cd backend && uv run scientist-bin provision analyst traditional

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend
        run: cd frontend && pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: cd frontend && pnpm exec playwright install --with-deps chromium

      - name: Run Playwright lifecycle tests
        run: cd frontend && pnpm exec playwright test --project=lifecycle
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          RUN_LIFECYCLE_TEST: "1"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-lifecycle-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-screenshots
          path: frontend/e2e/screenshots/
          retention-days: 14
